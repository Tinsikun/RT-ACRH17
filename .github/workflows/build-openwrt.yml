# Optimized version: Fixed C++20 gn compilation & swapfile EACCES errors

name: Build OpenWrt

# 添加全局权限，允许创建 Release
permissions:
  contents: write
  actions: read
  checks: read

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'
  schedule:
    - cron: '0 3 * * 5'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  # 强制使用 Node.js 24 以消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
    # ==================== 磁盘空间管理 ====================
    - name: Check disk space before cleanup
      run: |
        echo "Disk space BEFORE cleanup:"
        df -hT

    - name: Extreme disk space cleanup
      run: |
        echo "Starting extreme cleanup..."
        docker system prune -a -f || true
        
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /usr/local/graalvm \
          /usr/local/.ghcup \
          /usr/local/share/powershell \
          /usr/local/share/chromium \
          /usr/local/lib/node_modules \
          /opt/hostedtoolcache/CodeQL \
          /usr/share/swift \
          /usr/local/julia* \
          /usr/local/lib/heroku \
          /usr/local/share/boost \
          /usr/lib/jvm \
          /usr/local/.nvm \
          /usr/local/gem \
          /usr/local/aws-* \
          /usr/local/aws-cli \
          /usr/local/kubectl \
          /usr/local/miniconda \
          /usr/local/php \
          /usr/local/rustup \
          /usr/local/sbt \
          /usr/local/stack \
          /usr/local/terraform \
          /usr/local/pypy* \
          /usr/local/share/texlive
        
        sudo apt-get clean
        sudo apt-get autoremove --purge -y
        sudo journalctl --rotate
        sudo journalctl --vacuum-time=1s || true
        sudo rm -rf /tmp/* /var/tmp/*

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        remove-dotnet: 'false'
        remove-android: 'false'
        remove-haskell: 'false'
        remove-docker-images: 'true'
        # 已移除导致警告的 remove-temurin 和 remove-llvm

    # ==================== 环境初始化 ====================
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /var/cache/apt/archives/*
        sudo mkdir -p /var/cache/apt/archives/partial
        
        # 遵循官方指南：update 与 full-upgrade
        sudo apt-get update -y
        sudo apt-get full-upgrade -y
        
        # 遵循官方指南：完整安装编译依赖
        echo "Installing core dependencies..."
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev python2.7 liblua5.3-dev lua5.3 libev-dev
        
        sudo apt-get clean
        sudo rm -rf /var/cache/apt/archives/*
        
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE
        echo "Dependencies installation completed!"

    # ==================== 代码准备 ====================
    - name: Clone source code
      run: git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.ssh == 'true' || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    # ==================== 缓存与下载 ====================
    - name: Cache dl and ccache
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/feeds.conf.default', '.config', 'diy-part1.sh', 'diy-part2.sh') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        echo "Downloading packages..."
        make download -j8 || make download -j1 V=s
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        echo "Download completed!"

    # ==================== 固件编译 (已修复 C++ 报错) ====================
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        export CCACHE_DIR=${{ env.CCACHE_DIR }}
        ccache -M 8G
        echo -e "$(nproc) thread compile"
        
        # 【关键修复】降级宿主机 C++ 标准，解决 gn 包编译时的 __begin / sentinel_t 错误
        export HOST_CXXFLAGS="-std=c++17 -Wno-error=maybe-uninitialized"
        
        # 编译主流程：传递修复参数
        if make -j$(nproc) HOST_CXXFLAGS="$HOST_CXXFLAGS"; then
          echo "Compilation successful!"
        else
          echo "Multi-thread compilation failed, trying single thread with verbose output..."
          make -j1 V=s HOST_CXXFLAGS="$HOST_CXXFLAGS" 2>&1 | tee build.log
          exit 1
        fi
        
        echo "status=success" >> $GITHUB_OUTPUT
        
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        ccache -s

    - name: Check space usage after compilation
      if: (!cancelled())
      run: df -hT

    # ==================== 上传与发布 ====================
    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin
        retention-days: 7

    - name: Prepare firmware artifacts
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 7

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    # 【关键修复】删除影响 Release 上传的 Root 权限占位文件
    - name: Clean up temporary files before release
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        echo "Removing swapfile and pv.img to prevent EACCES errors..."
        sudo rm -f /swapfile
        sudo rm -f /pv.img || true

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
        generate_release_notes: false

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release list --limit 100 --json tagName --jq '.[].tagName' \
          | tail -n +4 \
          | while read tag; do
              gh release delete "$tag" --yes
              git push origin --delete "$tag" 2>/dev/null || true
            done
