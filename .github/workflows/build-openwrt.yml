name: Build OpenWrt (Ultimate Stable)

on:
  workflow_dispatch:
  repository_dispatch:
  schedule:
    - cron: '0 3 * * 5'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:

    # 1️⃣ 拉代码
    - name: Checkout
      uses: actions/checkout@v4

    # 2️⃣ 系统初始化（已防卡死）
    - name: Initialization environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
        build-essential clang flex bison g++ gawk \
        gcc-multilib gettext git libncurses-dev \
        libssl-dev python3 python3-distutils rsync \
        unzip zlib1g-dev file wget curl
        sudo timedatectl set-timezone "$TZ"

    # 3️⃣ 拉OpenWrt源码
    - name: Clone OpenWrt
      run: git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

    # 4️⃣ 多级缓存（核心）
    - name: Cache dl + ccache
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-openwrt-ultimate
        restore-keys: |
          ${{ runner.os }}-openwrt-

    # 5️⃣ feeds更新
    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 6️⃣ 配置
    - name: Load config
      run: |
        cd openwrt
        make defconfig

    # 7️⃣ 下载依赖（可缓存）
    - name: Download package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -delete

    # 8️⃣ 编译（带失败兜底）
    - name: Compile firmware (with retry)
      run: |
        cd openwrt
        export CCACHE_DIR=${{ env.CCACHE_DIR }}
        ccache -M 5G
        echo "CPU线程: $(nproc)"

        # 第一次并行编译
        make -j$(nproc) || (
          echo "⚠️ 并行失败，降级单线程重试"
          make -j1 V=s
        )

    # 9️⃣ 输出固件
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware
        path: openwrt/bin
