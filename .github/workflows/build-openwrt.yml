name: Build OpenWrt

# 添加全局权限，允许创建 Release
permissions:
  contents: write
  actions: read
  checks: read

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'true'
  schedule:
    - cron: '0 3 * * 5'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
    # ==================== 磁盘空间管理 ====================
    - name: Check disk space before cleanup
      run: |
        echo "=============================================================================="
        echo "Disk space BEFORE cleanup:"
        df -hT
        echo "=============================================================================="

    - name: Extreme disk space cleanup
      run: |
        echo "Starting extreme cleanup..."
        
        # 清理 Docker 镜像
        docker system prune -a -f || true
        
        # 删除所有不需要的大目录
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /usr/local/graalvm \
          /usr/local/.ghcup \
          /usr/local/share/powershell \
          /usr/local/share/chromium \
          /usr/local/lib/node_modules \
          /opt/hostedtoolcache/CodeQL \
          /usr/share/swift \
          /usr/local/julia* \
          /usr/local/lib/heroku \
          /usr/local/share/boost \
          /usr/lib/jvm \
          /usr/local/.nvm \
          /usr/local/gem \
          /usr/local/aws-* \
          /usr/local/aws-cli \
          /usr/local/kubectl \
          /usr/local/miniconda \
          /usr/local/php \
          /usr/local/rustup \
          /usr/local/sbt \
          /usr/local/stack \
          /usr/local/terraform \
          /usr/local/pypy* \
          /usr/local/share/texlive
        
        # 清理 apt 缓存
        sudo apt-get clean
        sudo apt-get autoremove --purge -y
        
        # 清理日志
        sudo journalctl --rotate
        sudo journalctl --vacuum-time=1s || true
        
        # 清理临时文件
        sudo rm -rf /tmp/*
        sudo rm -rf /var/tmp/*
        
        echo "=============================================================================="
        echo "Disk space AFTER cleanup:"
        df -hT
        echo "=============================================================================="

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        remove-dotnet: 'false'  # 已经手动删除
        remove-android: 'false'
        remove-haskell: 'false'
        remove-docker-images: 'true'
        remove-temurin: 'true'
        remove-llvm: 'true'

    - name: Final disk space check
      run: |
        echo "=============================================================================="
        echo "Disk space after maximize-build-space:"
        df -hT
        echo "=============================================================================="

    # ==================== 环境初始化 ====================
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 清理 apt 缓存目录
        sudo rm -rf /var/cache/apt/archives/*
        sudo mkdir -p /var/cache/apt/archives/partial
        
        sudo apt-get update
        
        # 第一批：核心依赖包
        echo "Installing core dependencies..."
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          libncurses5-dev \
          libncursesw5-dev \
          zlib1g-dev \
          gawk \
          git \
          gettext \
          libssl-dev \
          xsltproc \
          wget \
          unzip \
          python3 \
          python3-pip \
          python3-pyelftools \
          ccache \
          cmake \
          flex \
          bison \
          curl \
          libelf-dev \
          libfuse-dev \
          pkgconf \
          rsync
        
        # 清理缓存
        sudo apt-get clean
        sudo rm -rf /var/cache/apt/archives/*
        
        # 第二批：扩展包
        echo "Installing extended dependencies..."
        sudo apt-get install -y --no-install-recommends \
          ack \
          antlr3 \
          asciidoc \
          autoconf \
          automake \
          autopoint \
          binutils \
          bzip2 \
          cpio \
          device-tree-compiler \
          fastjar \
          g++-multilib \
          gcc-multilib \
          gperf \
          haveged \
          help2man \
          intltool \
          libc6-dev-i386 \
          libgmp3-dev \
          libltdl-dev \
          libmpc-dev \
          libmpfr-dev \
          libreadline-dev \
          libtool \
          lrzsz \
          mkisofs \
          msmtp \
          nano \
          ninja-build \
          p7zip \
          p7zip-full \
          patch \
          qemu-utils \
          scons \
          squashfs-tools \
          subversion \
          swig \
          texinfo \
          uglifyjs \
          upx-ucl \
          vim \
          xmlto \
          xxd \
          python2.7 \
          liblua5.3-dev \
          lua5.3 \
          libev-dev
        
        # 最终清理
        sudo apt-get clean
        sudo rm -rf /var/cache/apt/archives/*
        
        # 设置时区
        sudo timedatectl set-timezone "$TZ"
        
        # 修复工作空间权限
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE
        
        echo "Dependencies installation completed!"

    # ==================== 代码准备 ====================
    - name: Clone source code
      run: git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.ssh == 'true' || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    # ==================== 缓存与编译 ====================
    - name: Cache dl and ccache
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/feeds.conf.default', '.config', 'diy-part1.sh', 'diy-part2.sh') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        echo "Downloading packages..."
        make download -j$(nproc) || make download -j1
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        echo "Download completed!"

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        export CCACHE_DIR=${{ env.CCACHE_DIR }}
        ccache -M 8G
        echo -e "$(nproc) thread compile"
        
        # 编译主流程
        if make -j$(nproc); then
          echo "Compilation successful!"
        else
          echo "Multi-thread compilation failed, trying single thread with verbose output..."
          make -j1 V=s 2>&1 | tee build.log
          exit 1
        fi
        
        echo "status=success" >> $GITHUB_OUTPUT
        
        # 提取设备名称
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        
        # 显示 ccache 统计
        ccache -s

    - name: Check space usage after compilation
      if: (!cancelled())
      run: df -hT

    # ==================== 上传产物 ====================
    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin
        retention-days: 7

    - name: Prepare firmware artifacts
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "Firmware prepared at: $PWD"
        ls -lh

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 7

    - name: Upload firmware to cowtransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled()
      continue-on-error: true
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress ${FIRMWARE} 2>&1 | tee cowtransfer.log
        echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
        echo "url=$(cat cowtransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Upload firmware to WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled()
      continue-on-error: true
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer wet -s -p 16 --no-progress ${FIRMWARE} 2>&1 | tee wetransfer.log
        echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
        echo "url=$(cat wetransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    # ==================== Release 管理 ====================
    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        [ "$UPLOAD_COWTRANSFER" = "true" ] && echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
        [ "$UPLOAD_WETRANSFER" = "true" ] && echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
        generate_release_notes: false

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Keeping last 3 releases, deleting older ones..."
        gh release list --limit 100 --json tagName --jq '.[].tagName' \
          | tail -n +4 \
          | while read tag; do
              echo "Deleting old release: $tag"
              gh release delete "$tag" --yes
              git push origin --delete "$tag" 2>/dev/null || true
            done
